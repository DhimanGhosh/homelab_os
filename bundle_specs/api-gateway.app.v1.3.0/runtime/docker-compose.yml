services:
  api-gateway:
    build: .
    container_name: homelab-api-gateway
    restart: unless-stopped
    network_mode: host
    environment:
      LIBRARY_API: http://127.0.0.1:8132
      DICTIONARY_API: http://127.0.0.1:8133
      STATUSBOARD_API: http://127.0.0.1:8131
      NAVIDROME_API: http://127.0.0.1:4533
      NEXTCLOUD_STORAGE_PATH: /data/nextcloud
      INCOMING_DROP_PATH: /mnt/nas/homelab/media_drop/Incoming
    volumes:
      - /mnt/nas/homelab/media_drop/Incoming:/mnt/nas/homelab/media_drop/Incoming
      - ./data:/data
