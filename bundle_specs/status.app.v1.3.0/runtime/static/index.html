<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>App</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>

<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <div class="row" style="justify-content: flex-start; gap: 10px">
          <h1 id="appName" style="margin: 0"></h1>
          <span id="appVersion" class="version"></span>
        </div>
        <div class="muted" id="meta">Loading…</div>
      </div>
      <button class="btn" onclick="load()">Refresh</button>
    </div>

    <div class="grid" id="summary"></div>
    <div class="card">
      <h2 style="margin-top: 0">Services</h2>
      <div class="services" id="services"></div>
    </div>
    <div class="card">
      <h2 style="margin-top: 0">Tailscale Devices</h2>
      <div id="tailscale"></div>
      <div class="muted tiny" style="margin-top: 10px">
        Unpair/forget must still be performed from the Tailscale admin/device
        side. This board shows live connected peers.
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>

</html>
