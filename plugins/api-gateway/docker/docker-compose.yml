services:
  api-gateway:
    build: .
    container_name: api-gateway
    network_mode: host
    environment:
      PORT: "8134"
      APP_NAME: "API Gateway"
      APP_VERSION: "1.4.0"
      MUSIC_PLAYER_API: "http://127.0.0.1:8140"
      FILES_API: "http://127.0.0.1:8088"
      PIHOLE_API: "http://127.0.0.1:8080"
    restart: unless-stopped
