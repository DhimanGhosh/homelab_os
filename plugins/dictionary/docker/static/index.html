<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dictionary</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #eef3f9;
      color: #1f2f46;
      margin: 0
    }

    .top {
      background: #1b4c7b;
      color: #fff;
      padding: 18px 22px
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px
    }

    .card {
      background: #fff;
      border: 1px solid #d4deea;
      border-radius: 16px;
      padding: 16px
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap
    }

    .input-wrap {
      position: relative;
      flex: 1;
      min-width: 240px
    }

    .clear-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: #6c7d93;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      display: none
    }

    input {
      width: 100%;
      padding: 12px 38px 12px 12px;
      border: 1px solid #c7d5e5;
      border-radius: 12px
    }

    button {
      padding: 12px 16px;
      border: 0;
      border-radius: 12px;
      background: #1b4c7b;
      color: #fff;
      font-weight: 700;
      cursor: pointer
    }

    button[disabled] {
      opacity: .65;
      cursor: wait
    }

    .item {
      border-top: 1px solid #e6edf6;
      padding: 12px 0
    }

    .small {
      font-size: 12px;
      color: #6c7d93
    }

    .pill {
      display: inline-block;
      border-radius: 999px;
      background: #dfe8f2;
      padding: 4px 8px;
      margin: 3px;
      font-size: 12px
    }

    .error {
      color: #a12626;
      font-weight: 700
    }

    .hint {
      margin-top: 10px
    }

    .linkish {
      display: inline-block;
      border-radius: 999px;
      background: #dfe8f2;
      padding: 6px 10px;
      margin: 3px;
      cursor: pointer
    }
  </style>
</head>

<body>
  <div class="top">
    <div style="display:flex;justify-content:space-between;gap:12px;align-items:center">
      <h1 id="appName" style="margin:0">Offline Dictionary</h1><span id="appVersion"
        style="background:rgba(255,255,255,.18);padding:6px 10px;border-radius:999px;font-weight:700">v1.4.5</span>
    </div>
  </div>
  <div class="wrap">
    <div class="card">
      <div class="row">
        <div class="input-wrap"><input id="q" type="search" placeholder="Search a word"
            onkeydown="if(event.key==='Enter'){go();}"><button id="clearQ" class="clear-btn" type="button"
            aria-label="Clear">✕</button></div>
        <button id="searchBtn" onclick="go()">Search</button>
      </div>
      <div id="out" style="margin-top:16px"></div>
    </div>
  </div>
  <script>
    const byId = id => document.getElementById(id);
    const esc = s => (s ?? '').toString().replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));

    function suggestionPills(values) {
      return values.map(x => `<span class="linkish" data-word="${esc(x)}">${esc(x)}</span>`).join('');
    }

    async function go(forcedWord) {
      const q = (forcedWord || byId('q').value).trim();
      const out = byId('out');
      const btn = byId('searchBtn');
      if (!q) {
        out.innerHTML = '<div class="error">Please enter a word.</div>';
        return;
      }
      byId('q').value = q;
      btn.disabled = true;
      out.innerHTML = '<div class="small">Searching…</div>';
      try {
        const r = await fetch('/api/lookup?q=' + encodeURIComponent(q), { headers: { 'Accept': 'application/json' } });
        if (!r.ok) {
          throw new Error('Lookup failed with HTTP ' + r.status);
        }
        const d = await r.json();
        if (!d.found) {
          out.innerHTML = '<div>No result found.</div>' + ((d.suggestions || []).length ? `<div class="hint"><b>Did you mean:</b> ${suggestionPills(d.suggestions)}</div>` : '');
          bindSuggestionClicks();
          return;
        }
        out.innerHTML = `
          <h2 style="margin:0 0 6px 0">${esc(d.query)}</h2>
          <div><b>Synonyms:</b> ${d.synonyms.map(x => `<span class="pill">${esc(x)}</span>`).join('') || '<span class="small">None</span>'}</div>
          <div><b>Antonyms:</b> ${d.antonyms.map(x => `<span class="pill">${esc(x)}</span>`).join('') || '<span class="small">None</span>'}</div>
          ${d.meanings.map(m => `
            <div class="item">
              <div><b>${esc(m.part_of_speech)}</b></div>
              <div>${esc(m.definition)}</div>
              <div class="small">${m.examples.map(esc).join(' • ') || 'No examples available.'}</div>
              <div class="small">Related: ${m.lemmas.map(esc).join(', ')}</div>
            </div>
          `).join('')}
        `;
      } catch (err) {
        out.innerHTML = `<div class="error">${esc(err.message || 'Search failed.')}</div>`;
      } finally {
        btn.disabled = false;
      }
    }

    function bindSuggestionClicks() {
      document.querySelectorAll('.linkish[data-word]').forEach(el => {
        el.addEventListener('click', () => go(el.dataset.word || ''));
      });
    }
  </script>
  <script>fetch("/api/health").then(r => r.json()).then(data => { document.title = data.service || document.title; const n = document.getElementById("appName"); const v = document.getElementById("appVersion"); if (n && data.service) n.textContent = data.service; if (v && data.version) v.textContent = "v" + data.version; }).catch(() => { }); const q = document.getElementById('q'); const clearBtn = document.getElementById('clearQ'); function syncClear() { clearBtn.style.display = q.value ? 'block' : 'none'; } clearBtn.addEventListener('click', () => { q.value = ''; syncClear(); q.focus(); }); q.addEventListener('input', syncClear); syncClear();</script>
</body>

</html>
