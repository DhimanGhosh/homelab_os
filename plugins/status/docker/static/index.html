<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pi Status Board</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #09111d;
      color: #eef4ff;
      margin: 0
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px
    }

    .hero,
    .row {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap
    }

    .card {
      background: #121d30;
      border: 1px solid #22324f;
      border-radius: 18px;
      padding: 16px;
      margin-top: 16px
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px
    }

    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 14px
    }

    .muted {
      color: #9fb2d0
    }

    .ok {
      color: #22c55e
    }

    .bad {
      color: #ef4444
    }

    .pill {
      padding: 5px 10px;
      border-radius: 999px;
      background: #1e2f4f
    }

    .btn {
      background: #356dff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer
    }

    .tiny {
      font-size: 12px
    }

    .svc {
      background: #0d1627;
      border: 1px solid #22324f;
      border-radius: 14px;
      padding: 14px
    }

    .name {
      font-size: 18px;
      font-weight: 700
    }

    .mono {
      font-family: Consolas, monospace
    }

    .good {
      color: #34d399
    }

    .warn {
      color: #fbbf24
    }

    .version {
      background: rgba(255, 255, 255, .12);
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700
    }

    a {
      color: #93c5fd;
      text-decoration: none
    }

    @media(max-width:700px) {
      .wrap {
        padding: 12px
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <div class="row" style="justify-content:flex-start;gap:10px">
          <h1 id="appName" style="margin:0">Pi Status Board</h1><span id="appVersion" class="version">v1.3.0</span>
        </div>
        <div class="muted" id="meta">Loading…</div>
      </div>
      <button class="btn" onclick="load()">Refresh</button>
    </div>

    <div class="grid" id="summary"></div>
    <div class="card">
      <h2 style="margin-top:0">Services</h2>
      <div class="services" id="services"></div>
    </div>
    <div class="card">
      <h2 style="margin-top:0">Tailscale Devices</h2>
      <div id="tailscale"></div>
      <div class="muted tiny" style="margin-top:10px">Unpair/forget must still be performed from the Tailscale
        admin/device side. This board shows live connected peers.</div>
    </div>
  </div>
  <script>
    function esc(v) { return String(v ?? '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }
    function storageCard(label, s) { return `<div class="card"><div class="muted">${esc(label)}</div><div style="font-size:26px;font-weight:700">${esc(s.used_gb)} / ${esc(s.total_gb)} GB</div><div class="tiny muted">Free ${esc(s.free_gb)} GB • Used ${esc(s.used_pct)}%</div></div>`; }
    async function load() {
      const j = await fetch('/api/system').then(r => r.json());
      document.title = j.app_name || document.title;
      document.getElementById('appName').textContent = j.app_name || 'Pi Status Board';
      document.getElementById('appVersion').textContent = 'v' + (j.app_version || '');
      document.getElementById('meta').textContent = `${j.hostname} • ${j.summary.ok}/${j.summary.total} healthy • ${j.generated_at}`;
      document.getElementById('summary').innerHTML = `
    <div class="card"><div class="muted">Uptime</div><div style="font-size:26px;font-weight:700">${esc(j.uptime || '-')}</div><div class="tiny muted">Tailscale IP: ${esc(j.tailscale_ip || '-')}</div></div>
    ${storageCard('NAS Storage', j.nas_storage)}
    ${storageCard('Root Storage', j.root_storage)}
  `;
      document.getElementById('services').innerHTML = (j.services || []).map(s => `
    <div class="svc">
      <div class="row"><div class="name">${esc(s.name)}</div><div class="pill ${s.ok ? 'ok' : 'bad'}">${s.ok ? 'Online' : 'Offline'}</div></div>
      <div class="muted tiny">Version ${esc(s.version)} • Port ${esc(s.port)}</div>
      <div style="margin-top:10px"><a target="_blank" href="${esc(s.url)}">${esc(s.url)}</a></div>
      <div class="tiny muted" style="margin-top:8px">${s.ok ? ('HTTP ' + esc(s.status)) : esc(s.error || 'Unavailable')}</div>
    </div>
  `).join('');
      const peers = j.tailscale_devices || [];
      document.getElementById('tailscale').innerHTML = peers.length ? peers.map(p => `<div class="svc"><div class="row"><strong>${esc(p.name)}</strong><span class="${p.online ? 'good' : 'warn'}">${p.online ? 'Online' : 'Offline'}</span></div><div class="tiny muted">${esc(p.os || '-')} • ${esc(p.ip || '-')}</div></div>`).join('') : '<div class="muted">No peers found.</div>';
    }
    load();
    setInterval(load, 15000);
  </script>
</body>

</html>
