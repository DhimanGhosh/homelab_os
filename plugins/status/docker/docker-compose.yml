services:
  status:
    build: .
    container_name: pi-statusboard
    restart: unless-stopped
    network_mode: host
    environment:
      TAILSCALE_FQDN: ${TAILSCALE_FQDN:-pi-nas.taild4713b.ts.net}
      NAS_PATH: /mnt/nas
      APP_BASE: /mnt/nas/homelab/apps
    volumes:
      - /mnt/nas:/mnt/nas
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/hostname:/etc/hostname:ro
      - /etc/localtime:/etc/localtime:ro
