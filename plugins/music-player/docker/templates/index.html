<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Player</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>

<body>
  <div id="mobileOverlay" class="mobile-overlay hidden"></div>

  <div class="yt-shell">
    <aside id="sidebar" class="yt-sidebar">
      <div class="sidebar-top">
        <button id="menuToggleBtn" class="icon-btn menu-toggle" type="button">☰</button>
        <div class="yt-logo">
          <span class="logo-dot">▶</span>
          <span>Music</span>
        </div>
      </div>

      <nav class="yt-nav">
        <button class="yt-nav-btn active" data-view="home" type="button"><span>🏠</span><span>Home</span></button>
        <button class="yt-nav-btn" data-view="all" type="button"><span>🎵</span><span>All Songs</span></button>
        <button class="yt-nav-btn" data-view="artists" type="button"><span>🎤</span><span>Artists</span></button>
        <button class="yt-nav-btn" data-view="albums" type="button"><span>💿</span><span>Albums</span></button>
        <button class="yt-nav-btn" data-view="playlists" type="button"><span>📚</span><span>Playlists</span></button>
        <button class="yt-nav-btn" data-view="folders" type="button"><span>📁</span><span>Folders</span></button>
      </nav>

      <div class="sidebar-divider"></div>

      <div class="playlist-panel">
        <div class="playlist-head">
          <div>Saved playlists</div>
          <button id="newPlaylistBtn" class="ghost-btn small" type="button">+ New</button>
        </div>
        <div id="sidebarPlaylists" class="sidebar-playlists"></div>
      </div>
    </aside>

    <main class="yt-main">
      <header class="yt-topbar">
        <div class="topbar-search-wrap">
          <span class="search-icon">⌕</span>
          <input id="searchInput" class="topbar-search" type="search"
            placeholder="Search songs, albums, artists, folders" />
        </div>

        <div class="topbar-actions">
          <button id="shuffleAllBtn" class="ghost-btn" type="button">Shuffle all</button>
          <button id="refreshBtn" class="ghost-btn" type="button">Refresh</button>
        </div>
      </header>

      <section id="chipsBar" class="chips-bar"></section>
      <section id="contextHeader" class="context-header hidden"></section>
      <section id="contentArea" class="content-area"></section>
    </main>
  </div>

  <footer class="player-bar" id="playerBar">
    <div class="player-now">
      <div id="playerArt" class="player-art"><span>♪</span></div>
      <div class="player-meta">
        <div id="playerTitle" class="player-title">Nothing playing</div>
        <div id="playerSub" class="player-sub">Select a track to start playback</div>
      </div>
    </div>

    <div class="player-center">
      <div class="player-controls">
        <button id="prevBtn" class="icon-btn" type="button">⏮</button>
        <button id="playPauseBtn" class="icon-btn play-btn" type="button">▶</button>
        <button id="nextBtn" class="icon-btn" type="button">⏭</button>
      </div>

      <div class="seek-row">
        <span id="timeCurrent">0:00</span>
        <input id="seekRange" class="seek-range" type="range" min="0" max="1000" value="0" />
        <span id="timeTotal">0:00</span>
      </div>
    </div>

    <div class="player-right">
      <button id="shuffleBtn" class="icon-btn" type="button">🔀</button>
      <button id="repeatBtn" class="icon-btn" type="button">Off</button>
      <button id="queueBtn" class="icon-btn" type="button">≡</button>
    </div>
  </footer>

  <div id="queueDrawer" class="queue-drawer hidden">
    <div class="queue-drawer-panel">
      <div class="queue-drawer-head">
        <div>
          <div class="queue-title">Current queue</div>
          <div id="queueSubtitle" class="queue-subtitle">0 song(s)</div>
        </div>
        <button id="closeQueueBtn" class="icon-btn" type="button">✕</button>
      </div>
      <div id="queueList" class="queue-list"></div>
    </div>
  </div>

  <div id="playlistModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-dialog">
      <div class="modal-head">
        <h3>Create playlist</h3>
        <button id="closePlaylistModalBtn" class="icon-btn" type="button">✕</button>
      </div>
      <div class="modal-body">
        <input id="playlistNameInput" class="text-input" type="text" placeholder="Playlist name" />
        <div class="modal-actions">
          <button id="createPlaylistConfirmBtn" class="ghost-btn" type="button">Create</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/script.js"></script>
</body>

</html>
