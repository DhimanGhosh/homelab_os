services:
  expense-tracker:
    build: .
    container_name: expense-tracker
    environment:
      PORT: "8161"
      APP_NAME: "Expense Tracker"
      APP_VERSION: "1.0.2"
      APP_DATA_DIR: "/data"
      LOG_LEVEL: "INFO"
    ports:
      - "127.0.0.1:8161:8161"
    volumes:
      - /mnt/nas/homelab/runtime/expense-tracker/data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8161/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
